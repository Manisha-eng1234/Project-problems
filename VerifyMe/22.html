<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe - Step 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-success text-center">
                    VerifyMe
                </h2>
                <p class="text-center text-muted">
                    Open your account in minutes
                </p>
                <div class="progress mb-4">
                    <div class="progress-bar bg-success" style="width:66%">
                        Step 2 of 3
                    </div>
                </div>
                <h4 class="mb-4">
                    Address & Income
                </h4>
                <form>
                    <div class="mb-3">
                        <label class="form-label">
                            State
                        </label>
                        <select class="form-select">
                            <option selected>Select State</option>
                            <option>Uttar Pradesh</option>
                            <option>Delhi</option>
                            <option>Haryana</option>
                            <option>Punjab</option>
                            <option>Rajasthan</option>
                            <option>Maharashtra</option>
                            <option>Gujarat</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            City
                        </label>
                        <input type="text" class="form-control" placeholder="Enter City">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Address
                        </label>
                        <textarea class="form-control" rows="4" placeholder="Enter Complete Address"></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            Monthly Income
                        </label>
                        <input type="number" class="form-control" placeholder="Enter Monthly Income">
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="industry2.html" class="btn btn-secondary">
                            Back
                        </a>
                        <a href="33.html" class="btn btn-success">
                            Continue
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
