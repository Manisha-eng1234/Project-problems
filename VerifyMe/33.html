<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe - Step 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-success text-center">
                    VerifyMe
                </h2>
                <p class="text-center text-muted">
                    Open your account in minutes
                </p>
                <div class="progress mb-4">
                    <div class="progress-bar bg-success" style="width:100%">
                        Step 3 of 3
                    </div>
                </div>
                <h4 class="mb-4">
                    Documents & Verification
                </h4>
                <form>
                    <div class="mb-3">
                        <label class="form-label">
                            Upload ID Proof
                        </label>
                        <input type="file" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Select ID Type
                        </label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="proof" id="aadhaar">
                            <label class="form-check-label" for="aadhaar">
                                Aadhaar Card
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="proof" id="pan">
                            <label class="form-check-label" for="pan">
                                PAN Card
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="proof" id="passport">
                            <label class="form-check-label" for="passport">
                                Passport
                            </label>
                        </div>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terms">
                        <label class="form-check-label" for="terms">
                            I agree to the Terms & Conditions
                        </label>
                    </div>
                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" id="updates">
                        <label class="form-check-label" for="updates">
                            Receive Marketing Updates
                        </label>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="22.html" class="btn btn-secondary">
                            Back
                        </a>
                        <a href="44.html" class="btn btn-success">
                            Submit
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
