<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyMe - Step 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-success text-center">
                    VerifyMe
                </h2>
                <p class="text-center text-muted">
                    Open your account in minutes
                </p>
                <div class="progress mb-4">
                    <div class="progress-bar bg-success" style="width:33%">
                        Step 1 of 3
                    </div>
                </div>
                <h4 class="mb-4">
                    Identity
                </h4>
                <form>
                    <div class="mb-3">
                        <label class="form-label">
                            Full Name
                        </label>
                        <input type="text" class="form-control" placeholder="Enter Full Name">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Email Address
                        </label>
                        <input type="email" class="form-control" placeholder="Enter Email">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">
                            Mobile Number
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                +91
                            </span>
                            <input type="tel" class="form-control" placeholder="10 digit number">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">
                            PAN Number
                        </label>
                        <input type="text" class="form-control" placeholder="ABCDE1234F">
                    </div>
                    <div class="d-flex justify-content-between">
                        <button class="btn btn-secondary" disabled>
                            Back
                        </button>
                        <a href="22.html" class="btn btn-success">
                            Continue
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
